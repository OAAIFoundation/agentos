# ===================================================================
# Multi-Provider Configuration
# 支持所有 semantic-router 的 provider 类型 (15+ providers)
#
# Reference: semantic-router implementation
# ===================================================================

# ===================================================================
# Provider Definitions
# ===================================================================
providers:
  # ============== OpenAI ==============
  openai:
    base_url: "https://api.openai.com/v1"
    api_key: "env:OPENAI_API_KEY"
    provider_type: "openai"

  # ============== Anthropic ==============
  anthropic:
    base_url: "https://api.anthropic.com"
    api_key: "env:ANTHROPIC_API_KEY"
    provider_type: "anthropic"
    extra_headers:
      anthropic-version: "2023-06-01"

  # ============== AWS Bedrock ==============
  bedrock:
    base_url: "https://bedrock-runtime.us-east-2.amazonaws.com/v1"
    api_key: "env:AWS_BEDROCK_TOKEN"
    provider_type: "bedrock"

  # ============== Azure OpenAI ==============
  azure-openai-east:
    base_url: "https://my-resource.openai.azure.com/openai/deployments/gpt-4o"
    api_key: "env:AZURE_OPENAI_API_KEY"
    provider_type: "azure-openai"
    api_version: "2024-10-21"

  azure-openai-west:
    base_url: "https://my-resource-west.openai.azure.com/openai/deployments/gpt-4o"
    api_key: "env:AZURE_OPENAI_API_KEY"
    provider_type: "azure-openai"
    api_version: "2024-10-21"

  # ============== Google Gemini ==============
  gemini:
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
    api_key: "env:GOOGLE_API_KEY"
    provider_type: "gemini"

  # ============== Google Vertex AI ==============
  vertex-ai:
    base_url: "https://us-central1-aiplatform.googleapis.com/v1"
    api_key: "env:VERTEX_AI_TOKEN"
    provider_type: "vertex-ai"

  # ============== MiniMax (中国 LLM) ==============
  minimax:
    base_url: "https://api.minimax.io"
    api_key: "env:MINIMAX_API_KEY"
    provider_type: "minimax"

  # ============== 本地推理服务 ==============
  # vLLM
  local-vllm:
    base_url: "http://127.0.0.1:8000/v1"
    api_key: "EMPTY"
    provider_type: "vllm"

  # Ollama
  local-ollama:
    base_url: "http://127.0.0.1:11434/v1"
    api_key: "ollama"
    provider_type: "ollama"

  # LM Studio
  local-lm-studio:
    base_url: "http://127.0.0.1:1234/v1"
    api_key: "lm-studio"
    provider_type: "lm-studio"

  # ============== DeepSeek (中国 LLM) ==============
  deepseek:
    base_url: "https://api.deepseek.com"
    api_key: "env:DEEPSEEK_API_KEY"
    provider_type: "openai"  # OpenAI 兼容

  # ============== Qwen (阿里巴巴) ==============
  qwen:
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key: "env:QWEN_API_KEY"
    provider_type: "openai"  # OpenAI 兼容

  # ============== Baichuan (百川智能) ==============
  baichuan:
    base_url: "https://api.baichuan-ai.com/v1"
    api_key: "env:BAICHUAN_API_KEY"
    provider_type: "openai"  # OpenAI 兼容

  # ============== Zhipu (智谱 AI) ==============
  zhipu:
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    api_key: "env:ZHIPU_API_KEY"
    provider_type: "openai"  # OpenAI 兼容

  # ============== Moonshot (月之暗面) ==============
  moonshot:
    base_url: "https://api.moonshot.cn/v1"
    api_key: "env:MOONSHOT_API_KEY"
    provider_type: "openai"  # OpenAI 兼容

# ===================================================================
# Routing Rules
# ===================================================================
routes:
  # ============== OpenAI 模型 ==============
  - match_model: "gpt-4o"
    target_provider: "openai"
    target_model: "gpt-4o"
    priority: 100

  - match_model: "gpt-4o-mini"
    target_provider: "openai"
    target_model: "gpt-4o-mini"
    priority: 100

  - match_model: "gpt-4-turbo"
    target_provider: "openai"
    target_model: "gpt-4-turbo-preview"
    priority: 100

  # ============== Anthropic 模型 ==============
  - match_model: "claude-3-5-sonnet-20241022"
    target_provider: "anthropic"
    target_model: "claude-3-5-sonnet-20241022"
    priority: 100

  - match_model: "claude-3-opus-20240229"
    target_provider: "anthropic"
    target_model: "claude-3-opus-20240229"
    priority: 100

  - match_model: "claude-3-haiku-20240307"
    target_provider: "anthropic"
    target_model: "claude-3-haiku-20240307"
    priority: 100

  # ============== Bedrock 模型 ==============
  - match_model: "claude-sonnet-4.5"
    target_provider: "bedrock"
    target_model: "anthropic.claude-3-5-sonnet-20241022-v2:0"
    priority: 200

  - match_model: "claude-3.5-sonnet"
    target_provider: "bedrock"
    target_model: "anthropic.claude-3-5-sonnet-20241022-v2:0"
    priority: 200

  # ============== Azure OpenAI (负载均衡) ==============
  - match_model: "azure-gpt-4o"
    target_provider: "azure-openai-east"
    target_model: "gpt-4o"
    priority: 100

  - match_model: "azure-gpt-4o"
    target_provider: "azure-openai-west"
    target_model: "gpt-4o"
    priority: 100

  # ============== Gemini 模型 ==============
  - match_model: "gemini-1.5-pro"
    target_provider: "gemini"
    target_model: "gemini-1.5-pro"
    priority: 100

  - match_model: "gemini-1.5-flash"
    target_provider: "gemini"
    target_model: "gemini-1.5-flash"
    priority: 100

  # ============== Vertex AI 模型 ==============
  - match_model: "vertex-gemini-1.5-pro"
    target_provider: "vertex-ai"
    target_model: "gemini-1.5-pro"
    priority: 100

  # ============== MiniMax 模型 ==============
  - match_model: "abab6.5-chat"
    target_provider: "minimax"
    target_model: "abab6.5-chat"
    priority: 100

  - match_model: "abab5.5-chat"
    target_provider: "minimax"
    target_model: "abab5.5-chat"
    priority: 100

  # ============== 本地模型 ==============
  - match_model: "local-qwen"
    target_provider: "local-vllm"
    target_model: "Qwen/Qwen2.5-14B-Instruct"
    priority: 100

  - match_model: "local-llama"
    target_provider: "local-ollama"
    target_model: "llama3.1:8b"
    priority: 100

  - match_model: "local-*"
    target_provider: "local-lm-studio"
    target_model: "preserve"
    priority: 50

  # ============== 中国 LLM 模型 ==============
  - match_model: "deepseek-chat"
    target_provider: "deepseek"
    target_model: "deepseek-chat"
    priority: 100

  - match_model: "qwen-*"
    target_provider: "qwen"
    target_model: "preserve"
    priority: 100

  - match_model: "baichuan-*"
    target_provider: "baichuan"
    target_model: "preserve"
    priority: 100

  - match_model: "glm-*"
    target_provider: "zhipu"
    target_model: "preserve"
    priority: 100

  - match_model: "moonshot-*"
    target_provider: "moonshot"
    target_model: "preserve"
    priority: 100

  # ============== 通配符规则 ==============
  # Claude 系列（默认走 Anthropic）
  - match_model: "claude-*"
    target_provider: "anthropic"
    target_model: "preserve"
    priority: 10

  # GPT 系列（默认走 OpenAI）
  - match_model: "gpt-*"
    target_provider: "openai"
    target_model: "preserve"
    priority: 10

  # 默认规则（最低优先级）
  - match_model: "*"
    target_provider: "openai"
    target_model: "preserve"
    priority: 1

# ===================================================================
# Privacy Guard Configuration
# ===================================================================
privacy_guard:
  enabled: false  # 先禁用，后续实现

  policies:
    - name: "pii_detection"
      enabled: true
      patterns:
        - "\\b\\d{3}-\\d{2}-\\d{4}\\b"  # SSN
        - "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}\\b"  # Email

  regex_audit:
    enabled: true
    log_matches: true

  data_masking:
    enabled: false
    mask_char: "*"

# ===================================================================
# Server Configuration
# ===================================================================
server:
  host: "0.0.0.0"
  port: 8001
  workers: 1

# ===================================================================
# Logging Configuration
# ===================================================================
logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
