<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Gateway Dashboard</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app" v-cloak>
        <!-- Top Navigation -->
        <nav class="bg-white shadow-sm border-b border-gray-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center space-x-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                        <div>
                            <h1 class="text-xl font-bold text-gray-900">LLM Gateway Dashboard</h1>
                            <p class="text-xs text-gray-500">Route & Manage LLM API Providers</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-3">
                        <span v-if="loading" class="text-sm text-gray-500 flex items-center">
                            <svg class="animate-spin h-4 w-4 mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            Loading...
                        </span>
                        <button
                            @click="reloadConfig"
                            :disabled="loading"
                            class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed flex items-center space-x-2 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                            <span>Reload Config</span>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

            <!-- Success/Error Messages -->
            <div v-if="message" :class="messageClass" class="mb-6 p-4 rounded-lg flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <svg v-if="messageType === 'success'" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    <svg v-else xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                    <span>{{ message }}</span>
                </div>
                <button @click="message = ''" class="text-gray-500 hover:text-gray-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Providers Section -->
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 mb-8">
                <div class="border-b border-gray-200 px-6 py-4 flex justify-between items-center">
                    <div>
                        <h2 class="text-lg font-semibold text-gray-900">Providers</h2>
                        <p class="text-sm text-gray-500">Configure LLM API providers</p>
                    </div>
                    <button
                        @click="addProvider"
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center space-x-2 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        <span>Add Provider</span>
                    </button>
                </div>

                <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div v-for="(provider, name) in config.providers" :key="name"
                         class="border border-gray-200 rounded-lg p-4 hover:border-blue-300 transition">
                        <div class="flex justify-between items-start mb-3">
                            <input
                                v-model="provider._name"
                                @change="renameProvider(name, provider._name)"
                                class="text-lg font-semibold text-gray-900 border-b border-transparent hover:border-gray-300 focus:border-blue-500 outline-none px-1"
                                placeholder="Provider name">
                            <button
                                @click="deleteProvider(name)"
                                class="text-red-600 hover:text-red-800 p-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </div>
                        <div class="space-y-2">
                            <div>
                                <label class="block text-xs font-medium text-gray-700 mb-1">Base URL</label>
                                <input
                                    v-model="provider.base_url"
                                    type="text"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-blue-500 focus:border-blue-500"
                                    placeholder="https://api.example.com/v1">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-700 mb-1">API Key</label>
                                <input
                                    v-model="provider.api_key"
                                    type="text"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-blue-500 focus:border-blue-500 font-mono"
                                    placeholder="env:API_KEY or sk-xxx">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Routes Section -->
            <div class="bg-white rounded-lg shadow-sm border border-gray-200">
                <div class="border-b border-gray-200 px-6 py-4 flex justify-between items-center">
                    <div>
                        <h2 class="text-lg font-semibold text-gray-900">Routing Rules</h2>
                        <p class="text-sm text-gray-500">Configure routing logic (first match wins, order matters)</p>
                    </div>
                    <button
                        @click="addRoute"
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center space-x-2 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        <span>Add Route</span>
                    </button>
                </div>

                <div class="p-6 space-y-4">
                    <div v-for="(route, index) in config.routes" :key="index"
                         class="border border-gray-200 rounded-lg p-4 hover:border-blue-300 transition">
                        <div class="flex items-start space-x-3">
                            <!-- Reorder Buttons -->
                            <div class="flex flex-col space-y-1 pt-1">
                                <button
                                    @click="moveRoute(index, -1)"
                                    :disabled="index === 0"
                                    class="p-1 text-gray-400 hover:text-gray-600 disabled:opacity-30">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" />
                                    </svg>
                                </button>
                                <button
                                    @click="moveRoute(index, 1)"
                                    :disabled="index === config.routes.length - 1"
                                    class="p-1 text-gray-400 hover:text-gray-600 disabled:opacity-30">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                                    </svg>
                                </button>
                            </div>

                            <!-- Route Form -->
                            <div class="flex-1 space-y-3">
                                <div class="flex items-center space-x-2">
                                    <span class="inline-flex items-center px-2 py-1 rounded-md text-xs font-medium bg-gray-100 text-gray-800">
                                        Rule {{ index + 1 }}
                                    </span>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    <div>
                                        <label class="block text-xs font-medium text-gray-700 mb-1">Match Model Pattern</label>
                                        <input
                                            v-model="route.match_model"
                                            type="text"
                                            class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-blue-500 focus:border-blue-500"
                                            placeholder="gpt-4* or exact name">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-gray-700 mb-1">Keywords (comma-separated)</label>
                                        <input
                                            v-model="route._keywords_text"
                                            @input="updateKeywords(route)"
                                            type="text"
                                            class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-blue-500 focus:border-blue-500"
                                            placeholder="translate, summary (optional)">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-gray-700 mb-1">Target Provider</label>
                                        <select
                                            v-model="route.target_provider"
                                            class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-blue-500 focus:border-blue-500">
                                            <option v-for="(_, providerName) in config.providers" :key="providerName" :value="providerName">
                                                {{ providerName }}
                                            </option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-gray-700 mb-1">Target Model</label>
                                        <input
                                            v-model="route.target_model"
                                            type="text"
                                            class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-blue-500 focus:border-blue-500"
                                            placeholder="preserve or model name">
                                    </div>
                                </div>
                            </div>

                            <!-- Delete Button -->
                            <button
                                @click="deleteRoute(index)"
                                class="p-2 text-red-600 hover:text-red-800">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Save Button -->
            <div class="mt-8 flex justify-center">
                <button
                    @click="saveConfig"
                    :disabled="loading"
                    class="px-8 py-3 bg-blue-600 text-white text-lg rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed flex items-center space-x-2 shadow-lg hover:shadow-xl transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                    </svg>
                    <span>Save Configuration</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    config: {
                        providers: {},
                        routes: []
                    },
                    loading: false,
                    message: '',
                    messageType: 'success'
                };
            },
            computed: {
                messageClass() {
                    return this.messageType === 'success'
                        ? 'bg-green-50 border border-green-200 text-green-800'
                        : 'bg-red-50 border border-red-200 text-red-800';
                }
            },
            mounted() {
                this.loadConfig();
            },
            methods: {
                async loadConfig() {
                    this.loading = true;
                    try {
                        const response = await fetch('/api/config');
                        if (!response.ok) throw new Error('Failed to load config');

                        const data = await response.json();

                        // Add _name field for providers
                        if (data.providers) {
                            for (const [name, provider] of Object.entries(data.providers)) {
                                provider._name = name;
                            }
                        }

                        // Convert keywords array to comma-separated string
                        if (data.routes) {
                            data.routes.forEach(route => {
                                route._keywords_text = Array.isArray(route.contains_keywords)
                                    ? route.contains_keywords.join(', ')
                                    : '';
                            });
                        }

                        this.config = data;
                        this.showMessage('Configuration loaded successfully', 'success');
                    } catch (error) {
                        this.showMessage('Failed to load configuration: ' + error.message, 'error');
                    } finally {
                        this.loading = false;
                    }
                },

                async saveConfig() {
                    this.loading = true;
                    try {
                        // Clean up config before sending
                        const cleanConfig = JSON.parse(JSON.stringify(this.config));

                        // Remove _name fields and rebuild providers object
                        const cleanProviders = {};
                        for (const [name, provider] of Object.entries(cleanConfig.providers)) {
                            const cleanProvider = { ...provider };
                            const actualName = cleanProvider._name || name;
                            delete cleanProvider._name;
                            cleanProviders[actualName] = cleanProvider;
                        }
                        cleanConfig.providers = cleanProviders;

                        // Remove _keywords_text and ensure contains_keywords is array
                        cleanConfig.routes.forEach(route => {
                            delete route._keywords_text;
                            if (!Array.isArray(route.contains_keywords)) {
                                route.contains_keywords = [];
                            }
                        });

                        const response = await fetch('/api/config', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(cleanConfig)
                        });

                        if (!response.ok) {
                            const error = await response.json();
                            throw new Error(error.detail || 'Failed to save config');
                        }

                        this.showMessage('Configuration saved and reloaded successfully!', 'success');
                        await this.loadConfig();
                    } catch (error) {
                        this.showMessage('Failed to save configuration: ' + error.message, 'error');
                    } finally {
                        this.loading = false;
                    }
                },

                async reloadConfig() {
                    this.loading = true;
                    try {
                        const response = await fetch('/api/reload', { method: 'POST' });
                        if (!response.ok) throw new Error('Failed to reload config');

                        this.showMessage('Configuration reloaded successfully!', 'success');
                        await this.loadConfig();
                    } catch (error) {
                        this.showMessage('Failed to reload configuration: ' + error.message, 'error');
                    } finally {
                        this.loading = false;
                    }
                },

                addProvider() {
                    const name = `new_provider_${Date.now()}`;
                    this.config.providers[name] = {
                        _name: name,
                        base_url: 'https://api.example.com/v1',
                        api_key: 'env:API_KEY'
                    };
                },

                deleteProvider(name) {
                    if (confirm(`Delete provider "${name}"?`)) {
                        delete this.config.providers[name];
                    }
                },

                renameProvider(oldName, newName) {
                    if (oldName === newName) return;
                    if (!newName || newName.trim() === '') {
                        alert('Provider name cannot be empty');
                        return;
                    }
                    if (this.config.providers[newName]) {
                        alert('Provider name already exists');
                        return;
                    }

                    const provider = this.config.providers[oldName];
                    delete this.config.providers[oldName];
                    this.config.providers[newName] = provider;
                    provider._name = newName;
                },

                addRoute() {
                    this.config.routes.push({
                        match_model: 'gpt-*',
                        contains_keywords: [],
                        _keywords_text: '',
                        target_provider: Object.keys(this.config.providers)[0] || '',
                        target_model: 'preserve'
                    });
                },

                deleteRoute(index) {
                    if (confirm(`Delete rule ${index + 1}?`)) {
                        this.config.routes.splice(index, 1);
                    }
                },

                moveRoute(index, direction) {
                    const newIndex = index + direction;
                    if (newIndex < 0 || newIndex >= this.config.routes.length) return;

                    const routes = this.config.routes;
                    [routes[index], routes[newIndex]] = [routes[newIndex], routes[index]];
                },

                updateKeywords(route) {
                    const text = route._keywords_text || '';
                    route.contains_keywords = text
                        .split(',')
                        .map(k => k.trim())
                        .filter(k => k.length > 0);
                },

                showMessage(message, type) {
                    this.message = message;
                    this.messageType = type;
                    setTimeout(() => {
                        this.message = '';
                    }, 5000);
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
